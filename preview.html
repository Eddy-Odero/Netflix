<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDU-FLIX</title>
  <link rel="shortcut icon" href="images/logo.webp"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:     #141414;
      --red:    #e50914;
      --muted:  #b3b3b3;
      --surface:#1f1f1f;
      --border: #333;
    }

    body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:#fff; }

    /* ── HERO ── */
    .hero {
      position:relative; height:85vh;
      display:flex; align-items:center; overflow:hidden;
    }

    .bg-fallback {
      position:absolute; top:50%; left:50%;
      width:100%; height:100%;
      object-fit:cover; transform:translate(-50%,-50%); z-index:0;
    }

    .bg-video {
      position:absolute; top:50%; left:50%;
      min-width:100%; min-height:100%;
      transform:translate(-50%,-50%); object-fit:cover; z-index:1;
    }

    .overlay {
      position:absolute; inset:0;
      background:
        linear-gradient(to top, #141414 10%, transparent 60%),
        linear-gradient(to right, rgba(0,0,0,0.9) 25%, transparent 70%);
      z-index:2;
    }

    .hero-content {
      position:relative; z-index:3;
      max-width:550px; margin-left:60px;
    }

    .hero-content h1 { font-size:3rem; font-weight:800; margin-bottom:10px; }

    .meta { color:var(--muted); font-size:0.9rem; margin-bottom:10px; }

    .description { color:#e5e5e5; line-height:1.5; font-size:1.05rem; }

    /* ── BUTTONS ── */
    .buttons {
      margin-top:20px; display:flex;
      align-items:center; gap:10px; flex-wrap:nowrap;
    }

    .buttons button {
      border:none; padding:12px 24px; font-size:1rem;
      border-radius:4px; cursor:pointer; font-weight:bold;
      white-space:nowrap; flex-shrink:0;
    }

    .btn-play-hero  { background:#fff; color:#000; }
    .btn-trailer    { background:var(--red); color:#fff; }
    .btn-icon       { background:rgba(109,109,110,0.7); color:#fff; transition:background 0.2s; }
    .btn-icon:hover { background:rgba(109,109,110,1); }

    /* ── DETAILS ── */
    .details { padding:40px 60px; background:var(--bg); }

    .details .left { color:#d2d2d2; line-height:1.6; margin-bottom:20px; }

    .details .right { display:flex; flex-wrap:wrap; gap:10px; }

    .meta-chip {
      padding:6px 14px; border-radius:999px;
      background:rgba(255,255,255,0.08); color:#e5e5e5; font-size:0.85rem;
    }

    /* ── CAST ── */
    .cast { padding:20px 60px; margin-top:10px; }
    .cast h2 { margin-bottom:10px; }

    .cast-container { display:flex; gap:15px; overflow-x:auto; scroll-behavior:smooth; }
    .cast-container::-webkit-scrollbar { display:none; }

    .cast-card { min-width:120px; text-align:center; flex-shrink:0; }

    .cast-card img {
      width:90px; height:90px; border-radius:50%;
      object-fit:cover; border:2px solid #333;
    }

    .cast-card p { font-size:0.8rem; color:#ccc; margin-top:5px; }

    /* ── SEASONS / EPISODES ── */
    .episodes-section { padding:20px 60px; }

    .episodes-section h2 { margin-bottom:16px; font-size:1.3rem; }

    /* season tabs */
    .season-tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }

    .season-tab {
      padding:8px 20px; border-radius:4px; border:1px solid var(--border);
      background:none; color:var(--muted); font-size:0.9rem;
      cursor:pointer; transition:all 0.2s; font-family:Arial,sans-serif;
    }

    .season-tab:hover { border-color:#fff; color:#fff; }
    .season-tab.active { background:var(--red); border-color:var(--red); color:#fff; }

    /* episode list */
    .episode-list { display:flex; flex-direction:column; gap:12px; }

    .episode-card {
      display:flex; gap:16px; align-items:flex-start;
      background:var(--surface); border-radius:8px;
      padding:12px; cursor:pointer;
      transition:background 0.2s;
    }

    .episode-card:hover { background:#2a2a2a; }

    .ep-thumb-wrap { position:relative; flex-shrink:0; }

    .ep-thumb {
      width:160px; height:90px; object-fit:cover;
      border-radius:6px; display:block;
    }

    .ep-play-overlay {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.4); border-radius:6px;
      opacity:0; transition:opacity 0.2s;
    }

    .episode-card:hover .ep-play-overlay { opacity:1; }

    .ep-play-icon {
      width:40px; height:40px; border-radius:50%;
      background:rgba(255,255,255,0.9); border:none;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; color:#111; cursor:pointer;
      padding-left:3px;
    }

    .ep-info { flex:1; }

    .ep-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }

    .ep-title { font-size:0.95rem; font-weight:600; }

    .ep-duration { font-size:0.8rem; color:var(--muted); }

    .ep-desc { font-size:0.82rem; color:var(--muted); line-height:1.5; }

    /* ── MORE LIKE THIS ── */
    .row { padding:20px 60px; }
    .row h2 { margin-bottom:14px; }

    .row-container { display:flex; gap:10px; overflow-x:auto; scroll-behavior:smooth; }
    .row-container::-webkit-scrollbar { display:none; }

    .card {
      position:relative; min-width:160px; height:240px;
      border-radius:4px; overflow:hidden; cursor:pointer; flex-shrink:0;
    }

    .card-img { width:100%; height:100%; object-fit:cover; transition:transform 0.3s ease; }
    .card:hover .card-img { transform:scale(1.08); }

    .overlay-center, .overlay-bottom {
      position:absolute; left:50%; transform:translateX(-50%);
      opacity:0; transition:opacity 0.3s ease;
    }

    .overlay-center { top:50%; transform:translate(-50%,-50%); }
    .overlay-bottom { bottom:10px; }

    .card:hover .overlay-center,
    .card:hover .overlay-bottom { opacity:1; }

    .play-btn {
      width:50px; height:50px; border-radius:50%; border:none;
      background:rgba(241,232,232,0.85); color:#111; font-size:20px; cursor:pointer;
    }

    .info-btn {
      padding:6px 14px; border-radius:999px; border:none;
      background:rgba(245,236,236,0.856); color:#0e0d0d;
      font-size:0.75rem; cursor:pointer;
    }

    /* ── PLAYER MODAL ── */
    .modal {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.95); z-index:9999; overflow-y:auto;
    }

    .modal-content {
      position:relative; width:80%; max-width:900px; margin:5% auto;
    }

    iframe { width:100%; height:500px; border-radius:8px; border:none; }

    .close {
      position:absolute; right:5px; top:-35px;
      font-size:30px; cursor:pointer; color:#fff;
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .hero { height:60vh; align-items:flex-end; padding:0 16px 20px; }

      .hero-content { margin-left:0 !important; margin:0; max-width:100%; }
      .hero-content h1 { font-size:1.6rem; }
      .overlay { background:linear-gradient(to top, #141414 30%, transparent 80%); }
      .bg-video { display:none; }

      .buttons { flex-direction:column; width:100%; margin-top:16px; }
      .buttons button { width:100%; padding:14px; font-size:0.95rem; border-radius:6px; }

      .details, .cast, .episodes-section, .row { padding:16px; }

      .cast-card { min-width:80px; }
      .cast-card img { width:60px; height:60px; }
      .cast-card p { font-size:0.7rem; }

      .ep-thumb { width:110px; height:65px; }

      .row-container { scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
      .card { flex:0 0 42%; min-width:unset !important; height:180px; scroll-snap-align:start; }
      .overlay-center, .overlay-bottom { opacity:1; }

      .modal-content { width:95%; margin:15% auto; }
      iframe { height:220px; }
    }
  </style>
</head>
<body>

  <!-- HERO (populated by JS) -->
  <section class="hero" id="heroSection">
    <img id="bgFallback" class="bg-fallback" src="" alt="">
    <video id="bgVideo" class="bg-video" autoplay muted loop playsinline>
      <source id="bgVideoSrc" src="" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="hero-content">
      <h1 id="heroTitle">Loading...</h1>
      <p class="meta" id="heroMeta"></p>
      <p class="description" id="heroDesc"></p>
      <div class="buttons">
        <button class="btn-play-hero" id="btnPlayMovie">▶ Play Movie</button>
        <button class="btn-trailer"   id="btnTrailer">▶ Trailer</button>
        <button class="btn-icon"      id="btnMyList"><i class="fas fa-plus"></i> My List</button>
        <button class="btn-icon"      id="btnLike"><i class="far fa-thumbs-up"></i> Like</button>
      </div>
    </div>
  </section>

  <!-- DETAILS -->
  <section class="details">
    <div class="left" id="detailDesc"></div>
    <div class="right" id="detailChips"></div>
  </section>

  <!-- CAST -->
  <section class="cast" id="castSection" style="display:none">
    <h2>Cast</h2>
    <div class="cast-container" id="castContainer"></div>
  </section>

  <!-- EPISODES (series only) -->
  <section class="episodes-section" id="episodesSection" style="display:none">
    <h2>Episodes</h2>
    <div class="season-tabs" id="seasonTabs"></div>
    <div class="episode-list" id="episodeList"></div>
  </section>

  <!-- MORE LIKE THIS -->
  <section class="row">
    <h2>More Like This</h2>
    <div class="row-container" id="moreLikeThis"></div>
  </section>

  <!-- PLAYER MODAL -->
  <div class="modal" id="playerModal">
    <div class="modal-content">
      <span class="close" id="modalClose">&times;</span>
      <video id="localPlayer" controls style="display:none;width:100%;border-radius:8px;">
        <source id="localSrc" src="" type="video/mp4">
      </video>
      <iframe id="embedFrame" src="" style="display:none;"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </div>
  </div>

  <script>
    /* ── STATE ── */
    let movie   = null;
    let myList  = JSON.parse(localStorage.getItem('eduflix_mylist') || '[]');
    let inList  = false;
    let liked   = false;
    let allMovies = [];

    /* ── LOAD ── */
    async function loadMovies() {
      const paths = ['movies.json', 'files/movies.json', '../movies.json'];
      for (const path of paths) {
        try {
          const res = await fetch(path);
          if (!res.ok) continue;
          const data = await res.json();
          if (data.movies && data.movies.length) return data.movies;
        } catch (e) {}
      }
      return [];
    }

    async function init() {
      allMovies = await loadMovies();

      // Read ?id= from URL
      const params = new URLSearchParams(window.location.search);
      const id     = parseInt(params.get('id'));

      // Find movie — fall back to id 1 if none provided
      movie = allMovies.find(m => m.id === (id || 1)) || allMovies[0];

      if (!movie) { document.getElementById('heroTitle').textContent = 'Movie not found'; return; }

      document.title = `${movie.title} — EDU-FLIX`;
      inList = myList.includes(movie.id);

      renderHero();
      renderDetails();
      renderCast();
      renderEpisodes();
      renderMoreLikeThis();
      setupButtons();
    }

    /* ── HERO ── */
    function renderHero() {
      document.getElementById('heroTitle').textContent = movie.title;
      document.getElementById('heroMeta').textContent  =
        `${movie.year} • ${movie.ageRating || movie.rating} • ${movie.duration} • ${movie.genre}`;
      document.getElementById('heroDesc').textContent  = movie.description;

      const img = document.getElementById('bgFallback');
      img.src = movie.image; img.alt = movie.title;

      const vid = document.getElementById('bgVideo');
      const src = document.getElementById('bgVideoSrc');
      if (movie.video) {
        src.src = movie.video;
        vid.load();
      } else {
        vid.style.display = 'none';
      }

      // Update My List button
      updateListBtn();
    }

    /* ── DETAILS ── */
    function renderDetails() {
      document.getElementById('detailDesc').textContent = movie.description;
      document.getElementById('detailChips').innerHTML  =
        [...movie.categories, movie.duration]
          .map(c => `<div class="meta-chip">${c}</div>`).join('');
    }

    /* ── CAST ── */
    function renderCast() {
      if (!movie.cast || !movie.cast.length) return;
      document.getElementById('castSection').style.display = 'block';
      document.getElementById('castContainer').innerHTML =
        movie.cast.map(c => `
          <div class="cast-card">
            <img src="${c.image}" alt="${c.name}"
                 onerror="this.style.background='#333';this.removeAttribute('src')">
            <p>${c.name}</p>
          </div>`).join('');
    }

    /* ── EPISODES ── */
    let activeSeason = 0;

    function renderEpisodes() {
      if (movie.type !== 'series' || !movie.seasons || !movie.seasons.length) return;

      document.getElementById('episodesSection').style.display = 'block';

      // Build season tabs
      const tabs = document.getElementById('seasonTabs');
      tabs.innerHTML = movie.seasons.map((s, i) => `
        <button class="season-tab ${i === 0 ? 'active' : ''}"
                onclick="switchSeason(${i})">
          Season ${s.season}
        </button>`).join('');

      renderEpisodeList(0);
    }

    function switchSeason(index) {
      activeSeason = index;
      document.querySelectorAll('.season-tab').forEach((t, i) =>
        t.classList.toggle('active', i === index));
      renderEpisodeList(index);
    }

    function renderEpisodeList(seasonIndex) {
      const season   = movie.seasons[seasonIndex];
      const list     = document.getElementById('episodeList');

      list.innerHTML = season.episodes.map(ep => `
        <div class="episode-card" onclick="playEmbed('${ep.embed}')">
          <div class="ep-thumb-wrap">
            <img class="ep-thumb" src="${ep.thumb}" alt="S${season.season}E${ep.ep}"
                 onerror="this.style.background='#333';this.removeAttribute('src')">
            <div class="ep-play-overlay">
              <button class="ep-play-icon">&#9654;</button>
            </div>
          </div>
          <div class="ep-info">
            <div class="ep-header">
              <span class="ep-title">E${ep.ep}. ${ep.title}</span>
              <span class="ep-duration">${ep.duration}</span>
            </div>
            <p class="ep-desc">${ep.description}</p>
          </div>
        </div>`).join('');
    }

    /* ── MORE LIKE THIS ── */
    function renderMoreLikeThis() {
      const related = allMovies
        .filter(m => m.id !== movie.id &&
          m.categories.some(c => movie.categories.includes(c)))
        .slice(0, 8);

      const container = document.getElementById('moreLikeThis');
      container.innerHTML = related.map(m => `
        <div class="card" onclick="window.location.href='preview.html?id=${m.id}'">
          <img src="${m.image}" class="card-img" alt="${m.title}"
               onerror="this.style.background='#222';this.removeAttribute('src')">
          <div class="overlay-center">
            <button class="play-btn">▶</button>
          </div>
          <div class="overlay-bottom">
            <button class="info-btn">More Info</button>
          </div>
        </div>`).join('');
    }

    /* ── PLAYER MODAL ── */
    function openModal()  { document.getElementById('playerModal').style.display = 'block'; }
    function closePlayerModal() {
      document.getElementById('playerModal').style.display = 'none';
      const vid = document.getElementById('localPlayer');
      vid.pause(); vid.currentTime = 0;
      document.getElementById('localSrc').src = '';
      document.getElementById('embedFrame').src = '';
      document.getElementById('localPlayer').style.display  = 'none';
      document.getElementById('embedFrame').style.display   = 'none';
    }

    function playLocal(src) {
      document.getElementById('embedFrame').style.display  = 'none';
      const vid = document.getElementById('localPlayer');
      document.getElementById('localSrc').src = src;
      vid.style.display = 'block';
      vid.load();
      vid.play().catch(() => {});
      openModal();
    }

    function playEmbed(src) {
      document.getElementById('localPlayer').style.display = 'none';
      const frame = document.getElementById('embedFrame');
      // append autoplay param
      const sep = src.includes('?') ? '&' : '?';
      frame.src = src + sep + 'autoplay=1';
      frame.style.display = 'block';
      openModal();
    }

    document.getElementById('modalClose').addEventListener('click', closePlayerModal);
    document.getElementById('playerModal').addEventListener('click', e => {
      if (e.target === document.getElementById('playerModal')) closePlayerModal();
    });

    /* ── HERO BUTTONS ── */
    function setupButtons() {
      // Play Movie — use embed (archive.org link)
      document.getElementById('btnPlayMovie').addEventListener('click', () => {
        if (movie.video) playLocal(movie.video);
        else if (movie.embed) playEmbed(movie.embed);
        else alert('No video source set yet. Add an Archive.org embed URL to movies.json.');
      });

      // Trailer — plays local video file
      document.getElementById('btnTrailer').addEventListener('click', () => {
        if (movie.video) playLocal(movie.video);
        else alert('No trailer file set yet.');
      });

      // My List
      document.getElementById('btnMyList').addEventListener('click', () => {
        inList = !inList;
        if (inList) myList.push(movie.id);
        else myList = myList.filter(x => x !== movie.id);
        localStorage.setItem('eduflix_mylist', JSON.stringify(myList));
        updateListBtn();
      });

      // Like
      document.getElementById('btnLike').addEventListener('click', () => {
        liked = !liked;
        document.getElementById('btnLike').innerHTML = liked
          ? `<i class="fas fa-thumbs-up"></i> Liked`
          : `<i class="far fa-thumbs-up"></i> Like`;
      });
    }

    function updateListBtn() {
      document.getElementById('btnMyList').innerHTML = inList
        ? `<i class="fas fa-check"></i> Added`
        : `<i class="fas fa-plus"></i> My List`;
    }

    /* ── BOOT ── */
    init();
  </script>
</body>
</html>
